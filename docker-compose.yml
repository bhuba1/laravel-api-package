services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: auth_profile_test
      MYSQL_USER: auth_profile
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uauth_profile", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: auth_profile_test
      DB_USERNAME: auth_profile
      DB_PASSWORD: secret
    volumes:
      - ./test-app:/var/www/html
      - ./packages:/var/www/packages

volumes:
  mysql_data:
